[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = True
show_error_codes = True
exclude = (?x)(
    apps/backend/app/middleware/security\.py$|
    apps/backend/core/memory/backend_factory\.py$|
    apps/backend/core/memory/tests/test_memory_system\.py$|
    apps/backend/core/observability/enhanced_monitoring\.py$|
    apps/backend/tests/.*\.py$|
    tools/scripts/.*\.py$|
    venv/.*|
    \.venv/.*|
    node_modules/.*|
    __pycache__/.*
)