[pytest]
addopts = -q -ra --maxfail=1 --strict-markers --disable-warnings --cov=apps/backend --cov=backend --cov-report=term-missing:skip-covered
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
# detect tests in both legacy backend/ and new apps/backend/
testpaths =
    backend/tests
    apps/backend/tests
markers =
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    slow: marks tests as slow running
    compatibility: marks tests as compatibility tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
