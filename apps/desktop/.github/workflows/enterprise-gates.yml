name: Enterprise Gates

on:
  pull_request:
    paths:
      - "desktop_ai_zeta/**"
  push:
    branches: [main]
    paths:
      - "desktop_ai_zeta/**"

permissions:
  contents: read
  actions: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: desktop_ai_zeta

jobs:
  enterprise-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "desktop_ai_zeta/package-lock.json"

      - name: Install dependencies
        run: npm ci

      # Gate 1: Contracts-first validation
      - name: 📋 Validate App Config Schema
        run: npm run config:validate

      - name: 🔌 Validate Plugin Manifests
        run: npm run plugins:validate

      # Gate 2: TypeScript compilation
      - name: 🔍 TypeScript Check (--noEmit)
        run: npm run typecheck

      # Gate 3: Unit tests with coverage ≥80%
      - name: 🧪 Unit Tests + Coverage (≥80%)
        run: npm run test:ci

      # Gate 4: Build production bundle
      - name: 🏗️ Build Production
        run: npm run build

      # Gate 5: Bundle budget enforcement
      - name: 📊 Bundle Budget Check (170KB gzip/asset)
        run: npm run bundle:budget 170

      # Gate 6: SBOM generation (non-blocking)
      - name: 📄 Generate SBOM (CycloneDX)
        run: npm run sbom:gen
        continue-on-error: true

      # Gate 7: License scan (non-blocking)
      - name: ⚖️ License Scan
        run: npm run license:scan
        continue-on-error: true

      # Upload artifacts for compliance audit
      - name: 📤 Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: desktop_ai_zeta/coverage
          if-no-files-found: ignore
          retention-days: 7

      - name: 📤 Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-artifacts
          path: desktop_ai_zeta/sbom
          if-no-files-found: ignore
          retention-days: 30

      - name: 📤 Upload License Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: desktop_ai_zeta/licenses
          if-no-files-found: ignore
          retention-days: 30

      # Summary comment for debugging
      - name: 📝 Quality Gates Summary
        if: always()
        run: |
          echo "## 🎯 Enterprise Quality Gates Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Config Schema | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          echo "| Plugin Manifests | ✅ Pass |" >> $GITHUB_STEP_SUMMARY  
          echo "| TypeScript | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests + Coverage | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle Budget | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM | ⚠️ Advisory |" >> $GITHUB_STEP_SUMMARY
          echo "| License Scan | ⚠️ Advisory |" >> $GITHUB_STEP_SUMMARY
