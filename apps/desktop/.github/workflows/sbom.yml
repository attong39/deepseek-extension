name: SBOM & Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate CycloneDX SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom.json --output-format json

      - name: Run npm audit
        run: npm audit --audit-level moderate
        continue-on-error: true

      - name: Install OSV Scanner
        run: |
          curl -L https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner

      - name: Run OSV Scanner
        run: ./osv-scanner -r . --format json --output osv-report.json
        continue-on-error: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: |
            sbom.json
            osv-report.json
          retention-days: 30

      - name: Fail on critical vulnerabilities
        run: |
          if [ -f osv-report.json ]; then
            critical_count=$(jq '[.results[]?.packages[]?.vulnerabilities[]? | select(.severity == "CRITICAL")] | length' osv-report.json)
            if [ "$critical_count" -gt 0 ]; then
              echo "Found $critical_count critical vulnerabilities"
              exit 1
            fi
          fi
