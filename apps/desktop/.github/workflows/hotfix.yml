name: Hotfix Pre-Release

on:
  push:
    branches: ["hotfix/**"]

jobs:
  hotfix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run quality gates
        run: bash scripts/quality_gates.sh

      - name: Build distribution
        run: npm run dist

      - name: Run postflight checks
        run: node scripts/release_postflight.mjs

      - name: Upload hotfix artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hotfix-build-${{ github.sha }}
          path: |
            dist/**
            !dist/node_modules
          retention-days: 7

      - name: Comment on PR
        if: github.event.pull_request
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚨 **Hotfix Build Ready**
              
              ✅ Quality gates passed
              ✅ Artifacts generated and validated
              ✅ Checksums: \`dist/CHECKSUMS.txt\`
              
              Download artifacts from [Actions tab](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
              
              **Branch**: \`${{ github.ref_name }}\`
              **Commit**: \`${{ github.sha }}\``
            })
