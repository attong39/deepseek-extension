global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'apps/zeta-ai-agent'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'alertmanager:9093'

# Load rules once and periodically evaluate them
rule_files:
  - "alert.rules.yml"

# Scrape configurations
scrape_configs:
  # Zeta AI Agent metrics
  - job_name: 'zeta-metrics'
    static_configs:
      - targets: ['localhost:9100']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    
  # Health check endpoint
  - job_name: 'zeta-health'
    static_configs:
      - targets: ['localhost:9100']
    metrics_path: '/health'
    scrape_interval: 30s
    scrape_timeout: 5s
    
  # Readiness check endpoint  
  - job_name: 'zeta-readiness'
    static_configs:
      - targets: ['localhost:9100']
    metrics_path: '/ready'
    scrape_interval: 30s
    scrape_timeout: 5s

  # Self monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Alertmanager self monitoring
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['localhost:9093']

  # Node exporter (if available)
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
    metrics_path: '/node-metrics'
    scrape_interval: 30s

# Storage configuration (configured via command line flags)
# --storage.tsdb.retention.time=30d
# --storage.tsdb.retention.size=10GB
