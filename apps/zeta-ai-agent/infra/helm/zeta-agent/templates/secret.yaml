{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "zeta-agent.secretName" . }}
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    {{- include "zeta-agent.labels" . | nindent 4 }}
    {{- with .Values.secretLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.secretAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end }}
