name: 🚀 Zeta AI Agent CI/CD Pipeline
# Production-ready pipeline with security, monitoring, and deployment

on:
  push:
    branches: [main, develop, 'feature/*', 'hotfix/*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
  pull_request:
    branches: [main, develop]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: 'Skip tests'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Pre-flight Checks
  # ============================================================================
  
  pre-flight:
    name: 🔍 Pre-flight Checks
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.deploy-check.outputs.should-deploy }}
      environment: ${{ steps.deploy-check.outputs.environment }}
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Calculate version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            VERSION="1.0.${{ github.run_number }}"
          else
            VERSION="1.0.${{ github.run_number }}-${{ github.sha:0:7 }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📝 Version: $VERSION"

      - name: 🚀 Determine deployment
        id: deploy-check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should-deploy=true" >> $GITHUB_OUTPUT
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "should-deploy=true" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "should-deploy=true" >> $GITHUB_OUTPUT
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "should-deploy=false" >> $GITHUB_OUTPUT
            echo "environment=none" >> $GITHUB_OUTPUT
          fi

  # ============================================================================
  # Code Quality & Testing
  # ============================================================================
  
  quality:
    name: 🧪 Code Quality & Testing
    runs-on: ubuntu-latest
    needs: pre-flight
    if: ${{ !github.event.inputs.skip_tests }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📋 Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 Lint code
        run: npm run lint

      - name: 🏗️ Type check
        run: npm run compile

      - name: 🧪 Run unit tests
        run: npm test
        env:
          CI: true

      - name: 🛡️ Security audit
        run: npm audit --audit-level high

      - name: 📊 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            coverage/
            test-results/
          retention-days: 7

      - name: 📈 Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: always()
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  # ============================================================================
  # Security Scanning
  # ============================================================================
  
  security:
    name: 🔒 Security Scanning
    runs-on: ubuntu-latest
    needs: pre-flight
    permissions:
      security-events: write
      actions: read
      contents: read
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Run CodeQL Analysis
        uses: github/codeql-action/init@v2
        with:
          languages: typescript, javascript

      - name: 🏗️ Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: 📊 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

      - name: 🔐 Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/ci
            p/typescript
          generateSarif: "1"

      - name: 📤 Upload Semgrep results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: semgrep.sarif

  # ============================================================================
  # Build & Package
  # ============================================================================
  
  build:
    name: 🏗️ Build & Package
    runs-on: ubuntu-latest
    needs: [pre-flight, quality]
    if: always() && (needs.quality.result == 'success' || needs.quality.result == 'skipped')
    
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.pre-flight.outputs.version }}
          labels: |
            org.opencontainers.image.title=Zeta AI Agent
            org.opencontainers.image.description=AI-powered coding assistant for VS Code
            org.opencontainers.image.vendor=Zeta
            org.opencontainers.image.licenses=MIT

      - name: 🏗️ Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.pre-flight.outputs.version }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}

      - name: 📦 Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.pre-flight.outputs.version }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: 📤 Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  # ============================================================================
  # Container Security Scanning
  # ============================================================================
  
  container-security:
    name: 🛡️ Container Security Scan
    runs-on: ubuntu-latest
    needs: [pre-flight, build]
    permissions:
      security-events: write
    
    steps:
      - name: 🔍 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.pre-flight.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 📤 Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: 🔍 Run Grype vulnerability scanner
        uses: anchore/scan-action@v3
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.pre-flight.outputs.version }}
          fail-build: false
          output-format: sarif

      - name: 📤 Upload Grype scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: results.sarif

  # ============================================================================
  # Deployment
  # ============================================================================
  
  deploy:
    name: 🚀 Deploy to ${{ needs.pre-flight.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [pre-flight, build, container-security]
    if: needs.pre-flight.outputs.should-deploy == 'true'
    environment: 
      name: ${{ needs.pre-flight.outputs.environment }}
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: 🔑 Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
          kubectl config current-context

      - name: 🛠️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: 🏗️ Terraform Init
        working-directory: ./infra/terraform
        run: terraform init
        env:
          TF_VAR_environment: ${{ needs.pre-flight.outputs.environment }}

      - name: 📋 Terraform Plan
        working-directory: ./infra/terraform
        run: |
          terraform plan \
            -var="environment=${{ needs.pre-flight.outputs.environment }}" \
            -var="image_tag=${{ needs.pre-flight.outputs.version }}" \
            -var="image_registry=${{ env.REGISTRY }}" \
            -var="image_name=${{ env.IMAGE_NAME }}" \
            -out=tfplan

      - name: 🚀 Terraform Apply
        working-directory: ./infra/terraform
        run: terraform apply -auto-approve tfplan

      - name: ⏳ Wait for deployment
        run: |
          kubectl wait --for=condition=available --timeout=300s \
            deployment/zeta-agent \
            -n zeta-ai-${{ needs.pre-flight.outputs.environment }}

      - name: 🔍 Health check
        id: deploy
        run: |
          NAMESPACE="zeta-ai-${{ needs.pre-flight.outputs.environment }}"
          SERVICE_IP=$(kubectl get service zeta-agent -n $NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          
          if [[ -z "$SERVICE_IP" ]]; then
            SERVICE_IP=$(kubectl get service zeta-agent -n $NAMESPACE -o jsonpath='{.spec.clusterIP}')
          fi
          
          echo "url=http://$SERVICE_IP" >> $GITHUB_OUTPUT
          
          # Health check
          for i in {1..10}; do
            if curl -f "http://$SERVICE_IP/health"; then
              echo "✅ Health check passed"
              break
            fi
            echo "⏳ Waiting for service... ($i/10)"
            sleep 30
          done

      - name: 📊 Deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ needs.pre-flight.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ needs.pre-flight.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.pre-flight.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # Notifications
  # ============================================================================
  
  notify:
    name: 📢 Notifications
    runs-on: ubuntu-latest
    needs: [pre-flight, deploy]
    if: always() && needs.pre-flight.outputs.should-deploy == 'true'
    
    steps:
      - name: 📢 Slack notification
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ needs.deploy.result }}
          channel: '#deployments'
          title: 'Zeta AI Agent Deployment'
          message: |
            Environment: ${{ needs.pre-flight.outputs.environment }}
            Version: ${{ needs.pre-flight.outputs.version }}
            Status: ${{ needs.deploy.result }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: 📧 Email notification
        uses: dawidd6/action-send-mail@v3
        if: failure()
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: 'Zeta AI Agent Deployment Failed'
          to: ${{ secrets.EMAIL_RECIPIENTS }}
          from: 'DevOps <devops@zeta-ai.com>'
          body: |
            Deployment of Zeta AI Agent to ${{ needs.pre-flight.outputs.environment }} has failed.
            
            Version: ${{ needs.pre-flight.outputs.version }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref }}
            
            Please check the workflow logs for more details.

  # ============================================================================
  # Cleanup
  # ============================================================================
  
  cleanup:
    name: 🧹 Cleanup
    runs-on: ubuntu-latest
    needs: [pre-flight, deploy]
    if: always()
    
    steps:
      - name: 🗑️ Delete old images
        run: |
          echo "Cleaning up old container images..."
          # This would implement cleanup logic for old images
          # Keep last 10 images, delete older ones
          
      - name: 📋 Update deployment status
        run: |
          echo "Updating deployment status in monitoring system..."
          # This would update external monitoring/status systems
