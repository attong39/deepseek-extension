global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'zeta-ollama'
    scrape_interval: 15s
    metrics_path: /api/metrics
    static_configs:
      - targets: ['host.docker.internal:11434']  # Windows/Mac
      - targets: ['172.17.0.1:11434']            # Linux fallback
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.*)'
        replacement: 'ollama-${1}'

  - job_name: 'zeta-backend'
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8000']   # Windows/Mac
      - targets: ['172.17.0.1:8000']             # Linux fallback

  - job_name: 'prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    scrape_interval: 10s
    static_configs:
      - targets: ['node-exporter:9100']

rule_files:
  - 'alert.rules.yml'
