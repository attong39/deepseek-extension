# mypy configuration for the monorepo
[mypy]
python_version = 3.11
warn_redundant_casts = True
warn_unused_ignores = True
warn_unreachable = True
no_implicit_optional = True
pretty = True
show_column_numbers = True
show_error_context = True
namespace_packages = True
explicit_package_bases = True
#mypy_path accepts os pathsep (;) on Windows
mypy_path = apps;. ;backend
# Treat unknown external modules as missing but still report unresolved local imports
ignore_missing_imports = True

# Be stricter on our own code
[mypy-apps.*]
disallow_untyped_defs = True
check_untyped_defs = True
warn_return_any = True

[mypy-backend.*]
disallow_untyped_defs = True
check_untyped_defs = True
warn_return_any = True

[mypy-scripts.*]
disallow_untyped_defs = False
check_untyped_defs = True
