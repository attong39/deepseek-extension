version: '3.8'
services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
      - OLLAMA_NUM_PARALLEL=4
    deploy:
      resources:
        limits:
          memory: 12g
          cpus: '4'

  preload-models:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-lc", "ollama pull phi3:mini && ollama pull starcoder && ollama pull codellama:13b-instruct || true"]

  zeta-api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=ollama:11434
      - OLLAMA_REQUEST_TIMEOUT=300
    depends_on:
      - ollama
      - preload-models

volumes:
  ollama_data:
