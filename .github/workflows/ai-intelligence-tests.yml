name: AI Intelligence Tests

on:
  push:
    branches: [ main, '**/*' ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Install Node dependencies
        run: |
          npm ci --ignore-scripts

      - name: Run AI intelligence tests
        run: npm run test:ai-intelligence

      - name: Generate coverage report
        if: always()
        run: npm run test:coverage-ai

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-intelligence-coverage
          path: reports/coverage-ai-intelligence/
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-intelligence-test-results
          path: tools/ai-project-intelligence/out/
          if-no-files-found: ignore
