name: 'API Consistency & Auto-Fix Guard'

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  consistency-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests
      
      - name: Run API Hash Guard
        run: |
          python tools/api_consistency/run_guard.py --auto-fix
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        id: hash_guard
      
      - name: Run Auto-Fix Missing Imports & Dependencies
        run: |
          python tools/auto_fix/cli.py all
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        id: auto_fix
      
      - name: Auto-commit fixes
        if: github.event_name == 'pull_request' && (steps.hash_guard.outputs.exit_code == '1' || steps.auto_fix.outputs.exit_code == '0')
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "🤖 Auto-fix: API consistency + missing imports"
            git push
          fi
      
      - name: Upload consistency reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: consistency-reports
          path: |
            reports/api_consistency/
            reports/auto_fix/
          retention-days: 7