[[package]]
name = "zeta-ai-server"
version = "0.1.0"
source = { editable = "." }
dependencies = [
    { name = "aioredis" },
    { name = "alembic" },
    { name = "asyncpg" },
    { name = "celery" },
    { name = "click" },
    { name = "email-validator" },
    { name = "fastapi" },
    { name = "httpx" },
    { name = "numpy" },
    { name = "passlib", extra = ["bcrypt"] },
    { name = "pillow" },
    { name = "psutil" },
    { name = "pydantic" },
    { name = "pydantic-settings" },
    { name = "python-jose", extra = ["cryptography"] },
    { name = "python-multipart" },
    { name = "redis" },
    { name = "requests" },
    { name = "rich" },
    { name = "sqlalchemy" },
    { name = "tenacity" },
    { name = "uvicorn", extra = ["standard"] },
]

[package.optional-dependencies]
cv = [
    { name = "easyocr" },
    { name = "opencv-python" },
]
dev = [
    { name = "bandit" },
    { name = "fakeredis" },
    { name = "import-linter" },
    { name = "mkdocs" },
    { name = "mkdocs-material" },
    { name = "mypy" },
    { name = "pip-audit" },
    { name = "pre-commit" },
    { name = "pytest" },
    { name = "pytest-asyncio" },
    { name = "pytest-cov" },
    { name = "pytest-mock" },
    { name = "ruff" },
    { name = "types-pyyaml" },
    { name = "types-requests" },
    { name = "vulture" },
]
llm = [
    { name = "google-generativeai" },
    { name = "openai" },
]
observability = [
    { name = "opentelemetry-api" },
    { name = "opentelemetry-exporter-otlp" },
    { name = "opentelemetry-instrumentation-celery" },
    { name = "opentelemetry-instrumentation-fastapi" },
    { name = "opentelemetry-instrumentation-redis" },
    { name = "opentelemetry-instrumentation-sqlalchemy" },
    { name = "opentelemetry-sdk" },
    { name = "prometheus-client" },
    { name = "structlog" },
]
production = [
    { name = "gunicorn" },
    { name = "httptools" },
    { name = "python-json-logger" },
    { name = "sentry-sdk", extra = ["fastapi"] },
    { name = "uvloop", marker = "sys_platform != 'win32'" },
]
security-ai = [
    { name = "river" },
    { name = "tldextract" },
]
vector = [
    { name = "pinecone-client" },
]

